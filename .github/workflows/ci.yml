name: Continuous integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint and format check
        run: |
          # ruff check .
          ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install system packages
        run: |
          sudo apt -y install libegl1

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pip list

      - name: Run tests
        run: |
          pytest

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install .[docs]

      - name: Build docs
        run: |
          sphinx-build -b html docs docs/_build/html
