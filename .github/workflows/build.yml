name: Build

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-macos:
    name: Build macOS app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[bundle,notebook]

      - name: Run PyInstaller
        run: |
          cd package
          pyinstaller --noconfirm crispy.spec

      - name: Archive the application bundle
        # tar preserves symlinks and executable bits, which upload-artifact drops.
        run: tar -cpzf "package/Crispy-${{ matrix.arch }}.app.tar.gz" -C package/dist Crispy.app

      - name: Upload the application bundle
        uses: actions/upload-artifact@v6
        with:
          name: crispy-app-${{ matrix.arch }}
          path: package/Crispy-${{ matrix.arch }}.app.tar.gz

  merge-macos:
    name: Merge, sign, and notarize the universal macOS app
    needs: build-macos
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download the arm64 bundle
        uses: actions/download-artifact@v6
        with:
          name: crispy-app-arm64
          path: bundles/arm64

      - name: Download the x86_64 bundle
        uses: actions/download-artifact@v6
        with:
          name: crispy-app-x86_64
          path: bundles/x86_64

      - name: Extract the version
        run: |
          VERSION=$(grep -m1 '__version__' src/crispy/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Merge the bundles into a universal2 application
        run: |
          mkdir -p arm64 x86_64
          tar -xpf bundles/arm64/Crispy-arm64.app.tar.gz -C arm64
          tar -xpf bundles/x86_64/Crispy-x86_64.app.tar.gz -C x86_64
          python package/merge-universal.py arm64/Crispy.app x86_64/Crispy.app package/dist/Crispy.app

      - name: Sign, package and notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APPLICATION_SPECIFIC_PASSWORD }}
        run: |
          cd package
          bash codesign.sh

          ARCHS=$(lipo -archs dist/Crispy.app/Contents/MacOS/Crispy)
          echo "Universal executable architectures: ${ARCHS}"
          echo "${ARCHS}" | grep -q x86_64 && echo "${ARCHS}" | grep -q arm64 \
            || { echo "::error::merged application is not universal2"; exit 1; }
          if [ -n "${CERTIFICATE_BASE64}" ]; then
            codesign --verify --deep --strict --verbose=2 dist/Crispy.app
          fi

          bash create-dmg.sh
          bash notarize.sh
          mv artifacts/Crispy.dmg "artifacts/Crispy-${VERSION}-macos-universal2.dmg"

      - name: Upload the universal macOS application
        uses: actions/upload-artifact@v6
        with:
          name: Crispy-macOS-universal2
          path: package/artifacts/*.dmg

  build-windows:
    name: Build Windows installer
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[bundle,notebook]

      - name: Install Inno Setup
        run: choco install innosetup

      - name: Run PyInstaller
        run: |
          cd package
          pyinstaller --noconfirm crispy.spec

      - name: Upload the Windows installer
        uses: actions/upload-artifact@v6
        with:
          name: Crispy-Windows-x64
          path: |
            package/artifacts/*.exe
            package/artifacts/*.zip
