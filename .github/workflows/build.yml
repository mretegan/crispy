name: Build

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 6
      fail-fast: false
      matrix:
        os: [macos-15, macos-15-intel, windows-2022]
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[bundle,notebook]

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: |
          choco install innosetup

      - name: Run PyInstaller
        run: |
          cd package
          pyinstaller --noconfirm crispy.spec
          cd ..

      - name: Upload the Windows installer
        uses: actions/upload-artifact@v6
        if: runner.os == 'Windows'
        with:
          name: Crispy-${{ runner.os }}-${{ runner.arch }}-Python-${{ matrix.python-version }}
          path: package\artifacts\*.exe

      - name: Upload the macOS application
        uses: actions/upload-artifact@v6
        if: runner.os == 'macOS'
        with:
          name: Crispy-${{ runner.os }}-${{ runner.arch }}-Python-${{ matrix.python-version }}
          path: package/artifacts/*.dmg
