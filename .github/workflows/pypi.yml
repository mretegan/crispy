name: Publish to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build the distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build the sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Upload the distribution
        uses: actions/upload-artifact@v6
        with:
          name: pypi-dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    # Only publish for an actual release, never for a manual (workflow_dispatch) run.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/crispy/
    permissions:
      id-token: write  # PyPI Trusted Publishing (OIDC); no API token needed
    steps:
      - name: Download the distribution
        uses: actions/download-artifact@v6
        with:
          name: pypi-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
